name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/distributed-training-operator

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  release:
    name: Build and publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: operator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize and controller-gen
        run: make kustomize controller-gen

      - name: Regenerate CRDs
        run: make manifests

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest

      - name: Copy CRDs into Helm chart
        run: cp config/crd/bases/*.yaml chart/crds/

      - name: Package Helm chart
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          helm package chart/ \
            --version "$VERSION" \
            --app-version "${{ github.ref_name }}" \
            --destination dist/

      - name: Push Helm chart to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          helm push dist/distributed-training-operator-*.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Generate install manifest
        run: make build-installer IMG=${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: operator/dist/install.yaml
          generate_release_notes: true
