apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      role: nfs-server
  template:
    metadata:
      labels:
        role: nfs-server
    spec:
      containers:
      - name: nfs-server
        image: coolersport/volume-nfs:0.8
        ports:
          - name: nfs
            containerPort: 2049
          - name: mountd
            containerPort: 20048
          - name: rpcbind
            containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /exports
            name: nfs-pvc
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /exports/medical-meadow
            chmod -R 777 /exports
            echo "/exports *(rw,sync,no_subtree_check,no_root_squash,fsid=0)" > /etc/exports
            echo "/exports/medical-meadow *(rw,sync,no_subtree_check,no_root_squash)" >> /etc/exports
            /usr/sbin/rpcbind
            /usr/sbin/rpc.nfsd
            /usr/sbin/exportfs -r
            /usr/sbin/rpc.mountd -F
      volumes:
        - name: nfs-pvc
          gcePersistentDisk:
            pdName: nfs-disk
            fsType: ext4

---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
spec:
  ports:
    - name: nfs
      port: 2049
    - name: mountd
      port: 20048
    - name: rpcbind
      port: 111
  selector:
    role: nfs-server