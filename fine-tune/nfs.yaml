# Backing PV/PVC: binds the GCP persistent disk (nfs-disk) to the NFS server pod
# via the GKE CSI driver. Required for GKE 1.29+ where the in-tree gcePersistentDisk
# volume type was removed.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-backing-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    name: nfs-backing-pvc
    namespace: default
  csi:
    driver: pd.csi.storage.gke.io
    volumeHandle: projects/praktikum2-494215/zones/us-east1-d/disks/nfs-disk
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-backing-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  volumeName: nfs-backing-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      role: nfs-server
  template:
    metadata:
      labels:
        role: nfs-server
    spec:
      containers:
      - name: nfs-server
        image: coolersport/volume-nfs:0.8
        ports:
          - name: nfs
            containerPort: 2049
          - name: mountd
            containerPort: 20048
          - name: rpcbind
            containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /exports
            name: nfs-disk
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /exports/medical-meadow
            chmod -R 777 /exports
            echo "/exports *(rw,sync,no_subtree_check,no_root_squash,fsid=0)" > /etc/exports
            echo "/exports/medical-meadow *(rw,sync,no_subtree_check,no_root_squash)" >> /etc/exports
            /usr/sbin/rpcbind
            /usr/sbin/rpc.nfsd
            /usr/sbin/exportfs -r
            /usr/sbin/rpc.mountd -F
      volumes:
        - name: nfs-disk
          persistentVolumeClaim:
            claimName: nfs-backing-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
spec:
  ports:
    - name: nfs
      port: 2049
    - name: mountd
      port: 20048
    - name: rpcbind
      port: 111
  selector:
    role: nfs-server
