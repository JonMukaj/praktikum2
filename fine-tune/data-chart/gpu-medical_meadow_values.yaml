metadata:
  name: medical-meadow
  namespace: kubeflow-user-example-com

secret:
  encodedToken: <>

image:
  name: jmukaj/gpu-fine-tuner-hf # jmukaj/fine-tuner-hf #jmukaj/gpu-data-parallel-fine-tuner-hf # jmukaj/fine-tuner-hf # intel/ai-workflows  # Image with PyTorch + Transformers + IPEX
  tag: v1.0.0 # v1.0.0 # v1.0.0 # torch-2.2.0-huggingface-multinode-py3.10
  pullPolicy: IfNotPresent


securityContext:
  runAsUser: 0
  runAsGroup: 0

distributed:
  workers: 1 # set num_of_total_nodes-1 for distributed
  script: /workspace/scripts/finetune.py
  modelNameOrPath: BEE-spoke-data/smol_llama-101M-GQA  # BEE-spoke-data/smol_llama-101M-GQA  # meta-llama/Llama-3.2-1B
  logLevel: info

  doTrain: True
  doEval: True

  train:
    datasetName: medalpaca/medical_meadow_medical_flashcards
    promptWithInput: Below is an instruction that describes a task, paired with an input that provides further context. Write a response that appropriately completes the request.
    promptWithoutInput: Below is an instruction that describes a task. Write a response that appropriately completes the request.
    perDeviceBatchSize: 4
    epochs: 1
    maxSteps: -1
    gradientAccumulationSteps: 1
    learningRate: 2e-5
    maxGradNorm: 1.0
    warmupSteps: 50
    ddpBackend: gloo
    ddpFindUnusedParameters: False
    outputDir: /tmp/output/saved_model
    loggingSteps: 10
    saveTotalLimit: 2
    saveStrategy: epoch
    useLora: True
    loraRank: 4
    loraAlpha: 8
    loraDropout: 0.1
    loraTargetModules: q_proj v_proj k_proj o_proj gate_proj up_proj down_proj
    overwriteOutputDir: True
    bf16: True
    useCpu: False

  eval:
    perDeviceBatchSize: 4
    validationSplitPercentage: 0.20
    bf16_full_eval: True

envVars:
  ldPreload: /usr/lib/x86_64-linux-gnu/libtcmalloc.so.4.5.9:/usr/local/lib/libiomp5.so
  logLevel: INFO
  transformersCache: /tmp/transformers_cache 
  hfDatasetsCache: /tmp/hf_dataset_cache
  hfHome: /tmp/home

resources:
  # cpuRequest: "4"
  # cpuLimit: "4"
  # memoryRequest: "24Gi"
  # memoryLimit: "24Gi"
  gpuLimit: 1
  tolerations:
    - key: "role"
      operator: "Equal"
      value: "worker"
      effect: "NoSchedule"
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"

storage:
  storageClassName: ""
  resources: 50Gi
  pvcMountPath: /tmp