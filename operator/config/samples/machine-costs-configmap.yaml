# ---------------------------------------------------------------------------
# Machine hourly costs per node (USD).
# Used by the solver to estimate cost and pick optimal topology.
# Namespace/name must match the operator flags:
#   --machine-costs-configmap=machine-costs
#   --machine-costs-namespace=distributed-training-system
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: machine-costs
  namespace: distributed-training-system
data:
  # GCE machine types — on-demand hourly prices (us-central1, approximate)
  c4-highcpu-8: "0.35"
  # Add GPU types here as needed
  # n1-standard-4-gpu: "2.48"