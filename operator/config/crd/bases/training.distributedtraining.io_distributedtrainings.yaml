                              properties:
                                containerName:
                                  description: 'Container name: required for volumes,
                                    optional for env vars'
                                  type: string
                                divisor:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: Specifies the output format of the
                                    exposed resources, defaults to "1"
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                resource:
                                  description: 'Required: resource to select'
                                  type: string
                              required:
                              - resource
                              type: object
                              x-kubernetes-map-type: atomic
                            secretKeyRef:
                              description: Selects a key of a secret in the pod's
                                namespace
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  image:
                    description: Image is the container image for both master and
                      worker pods.
                    minLength: 1
                    type: string
                  masterReplicas:
                    default: 1
                    description: MasterReplicas is the number of master replicas.
                      Defaults to 1.
                    format: int32
                    type: integer
                  resources:
                    description: Resources specifies the compute resources for each
                      replica pod.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                required:
                - image
                type: object
              restartPolicy:
                default: Never
                description: |-
                  RestartPolicy controls what happens when the underlying backend job
                  disappears unexpectedly (e.g. manually deleted) while the DistributedTraining
                  is still Running.
                  Never (default): mark the DistributedTraining as Failed.
                  OnFailure: recreate the backend job and continue from the last checkpoint if one exists.
                enum:
                - Never
                - OnFailure
                type: string
              resumeFromCheckpoint:
                description: |-
                  ResumeFromCheckpoint is an explicit checkpoint path injected into the
                  torchrun command (e.g. "checkpoints/checkpoint-500"). PyTorch backend only.
                  Setting this on Spark or job backends emits a Warning and has no effect.
                type: string
              sparkSpec:
                description: |-
                  SparkSpec configures the Spark Operator backend.
                  Required when backend is "spark"; ignored otherwise.
                properties:
                  arguments:
                    description: Arguments is the list of arguments to pass to the
                      main application.
                    items:
                      type: string
                    type: array
                  driverMemory:
                    default: 2g
                    description: DriverMemory is the memory request for the driver
                      pod (e.g. "2g").
                    type: string
                  driverServiceAccount:
                    default: spark
                    description: |-
                      DriverServiceAccount is the Kubernetes service account for the Spark driver pod.
                      The SA must already exist and have permission to create executor pods.
                      Defaults to "spark".
                    type: string
                  executorMemory:
                    default: 4g
                    description: ExecutorMemory is the memory request per executor
                      pod (e.g. "4g").
                    type: string
                  image:
                    description: Image is the container image for the driver and executor
                      pods.
                    minLength: 1
                    type: string
                  mainApplicationFile:
                    description: |-
                      MainApplicationFile is the path to the application entry point
                      (e.g. "local:///opt/spark/app/job.py").
                    minLength: 1
                    type: string
                  sparkVersion:
                    default: 3.5.0
                    description: SparkVersion is the version of Spark to use, e.g.
                      "3.5.0".
                    type: string
                  type:
                    default: Python
                    description: Type is the Spark application type. One of Python,
                      Scala, Java, R.
                    enum:
                    - Python
                    - Scala
                    - Java
                    - R
                    type: string
                required:
                - image
                - mainApplicationFile
                type: object
              topology:
                description: |-
                  Topology configures the distributed job layout.
                  Required for spark backend (unless objective is set). For pytorch, derived from
                  pytorchSpec.masterReplicas + workerReplicas.
                properties:
                  nodes:
                    description: |-
                      Nodes is the total number of worker nodes.
                      Zero is valid in objective mode (solver fills this in via status.resolvedTopology).
                    format: int32
                    minimum: 0
                    type: integer
                  processesPerNode:
                    default: 1
                    description: ProcessesPerNode is the number of processes (ranks)
                      per node.
                    format: int32
                    type: integer
                type: object
              training:
                description: |-
                  Training holds the standard hyperparameters.
                  Optional LLM overlay for pytorch backend.
                properties:
                  batchSize:
                    default: 4
                    description: BatchSize is the per-device training batch size.
                    format: int32
                    minimum: 1
                    type: integer
                  ddpBackend:
                    description: |-
                      DDPBackend is the PyTorch distributed backend (gloo, nccl, mpi).
                      Defaults to "gloo" for CPU jobs and "nccl" for GPU jobs when unset.
                    enum:
                    - gloo
                    - nccl
                    - mpi
                    type: string
                  ddpFindUnusedParameters:
                    description: DDPFindUnusedParameters sets find_unused_parameters
                      in DDP.
                    type: boolean
                  epochs:
                    default: 1
                    description: Epochs is the number of training epochs.
                    format: int32
                    minimum: 1
                    type: integer
                  evalBatchSize:
                    description: |-
                      EvalBatchSize is the per-device evaluation batch size.
                      When 0, defaults to the training batch size.
                    format: int32
                    type: integer
                  gradAccumulationSteps:
                    default: 1
                    description: GradAccumulationSteps accumulates gradients over
                      N steps.
                    format: int32
                    type: integer
                  learningRate:
                    default: "2e-5"
                    description: LearningRate as a decimal string, e.g. "2e-5".
                    type: string
                  loggingSteps:
                    default: 10
                    description: LoggingSteps is the number of update steps between
                      log outputs.
                    format: int32
                    type: integer
                  maxGradNorm:
                    description: MaxGradNorm is the gradient clipping max norm. Defaults
                      to 1.0.
                    type: string
                  maxSteps:
                    default: -1
                    description: MaxSteps overrides epochs-based training. -1 means
                      train for full epochs.
                    format: int32
                    type: integer
                  overwriteOutputDir:
                    description: OverwriteOutputDir overwrites the output directory
                      if it already exists.
                    type: boolean
                  saveStrategy:
                    default: epoch
                    description: SaveStrategy controls when checkpoints are saved
                      (epoch or steps).
                    enum:
                    - epoch
                    - steps
                    - "no"
                    type: string
                  saveTotalLimit:
                    default: 2
                    description: SaveTotalLimit caps the number of saved checkpoints.
                    format: int32
                    type: integer
                  useFastTokenizer:
                    description: |-
                      UseFastTokenizer controls whether to use the fast HuggingFace tokenizer.
                      When unset, the training script default applies (true).
                      Set to false for models where the fast tokenizer produces incorrect output.
                    type: boolean
                  validationSplit:
                    default: "0.2"
                    description: ValidationSplit fraction of the dataset reserved
                      for evaluation.
                    type: string
                  warmupSteps:
                    default: 0
                    description: WarmupSteps is the number of linear warmup steps
                      for the learning rate scheduler.
                    format: int32
                    type: integer
                required:
                - batchSize
                - epochs
                - learningRate
                type: object
            type: object
            x-kubernetes-validations:
            - message: spec.topology.nodes must be >= 1 when spec.objective is not
                set
              rule: has(self.objective) || self.topology.nodes >= 1
          status:
            description: DistributedTrainingStatus defines the observed state of a
              DistributedTraining.
            properties:
              conditions:
                description: Conditions provides machine-readable status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
