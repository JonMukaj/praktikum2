            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DistributedTrainingSpec defines the desired state of a DistributedTraining.
            properties:
              backend:
                allOf:
                - enum:
                  - pytorch
                  - spark
                  - job
                - enum:
                  - pytorch
                  - spark
                  - job
                default: pytorch
                description: Backend selects the distributed-training framework. Defaults
                  to pytorch.
                type: string
              dataset:
                description: |-
                  Dataset identifies the Hugging Face dataset to train on.
                  Optional LLM overlay; ignored by generic backends.
                properties:
                  cacheDirectory:
                    description: CacheDirectory is the path inside the container where
                      the dataset cache is stored.
                    type: string
                  name:
                    description: Name is the Hugging Face dataset identifier.
                    minLength: 1
                    type: string
                  promptWithInput:
                    description: PromptWithInput overrides the prompt template used
                      when an instruction has an input field.
                    type: string
                  promptWithoutInput:
                    description: PromptWithoutInput overrides the prompt template
                      used when an instruction has no input field.
                    type: string
                  split:
                    default: train
                    description: |-
                      Split controls which portion of the dataset is used for training.
                      Defaults to "train".
                    type: string
                required:
                - name
                type: object
              hardware:
                description: |-
                  Hardware selects the GKE node pool and machine type.
                  Required for spark backend. For pytorch, hardware type is inferred
                  from pytorchSpec.resources when not set.
                properties:
                  diskSizeGb:
                    description: |-
                      DiskSizeGb overrides the boot disk size (in GB) for each node in the
                      ephemeral node pool the operator provisions. When 0 (the default),
                      the operator falls back to its `--default-disk-size-gb` flag.
                    format: int32
                    minimum: 10
                    type: integer
                  gpuCount:
                    default: 1
                    description: GPUCount is the number of GPUs per node. Defaults
                      to 1.
                    format: int32
                    type: integer
                  gpuType:
                    description: GPUType is the accelerator type when hardware.type=gpu,
                      e.g. "nvidia-l4".
                    type: string
                  machineType:
                    description: MachineType overrides the GCE machine type, e.g.
                      "c4-highcpu-8".
                    type: string
                  nodePoolName:
                    description: NodePoolName overrides the default node pool selected
                      by the operator.
                    type: string
                  type:
                    allOf:
                    - enum:
                      - cpu
                      - gpu
                    - enum:
                      - cpu
                      - gpu
                    description: Type selects cpu or gpu hardware.
                    type: string
                type: object
              model:
                description: |-
                  Model identifies the language model to fine-tune.
                  Optional LLM overlay for pytorch; ignored by spark backend.
                properties:
                  cacheDir:
                    default: /mnt/output/hf-cache
                    description: |-
                      CacheDir is the path inside the training container where Hugging Face
                      caches downloaded model weights. Defaults to /mnt/output/hf-cache (persisted on PVC).
                    type: string
                  hfTokenSecret:
                    description: |-
                      HFTokenSecret references the Kubernetes Secret key that holds the
                      Hugging Face access token. Required for gated models.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                  name:
                    description: Name is the Hugging Face model identifier, e.g. "meta-llama/Llama-3.2-1B".
                    minLength: 1
                    type: string
                  trainingScript:
                    default: /workspace/finetune.py
                    description: |-
                      TrainingScript is the path to the fine-tuning script inside the container.
                      Defaults to /workspace/finetune.py.
                    type: string
                required:
                - name
                type: object
              objective:
                description: |-
                  Objective declares time/cost constraints for automatic topology sizing.
                  Mutually exclusive with explicit topology fields.
                properties:
                  maxCost:
                    description: |-
                      MaxCost is the maximum allowed spend in USD (e.g. "8.00").
                      At least one of TargetTime or MaxCost must be set.
                    type: string
                  maxNodes:
                    description: MaxNodes is a hard cap on the node count the solver
                      may select.
                    format: int32
                    minimum: 2
                    type: integer
                  targetTime:
                    description: |-
                      TargetTime is the desired maximum wall-clock duration (e.g. "2h", "90m").
                      At least one of TargetTime or MaxCost must be set.
                    type: string
                required:
                - maxNodes
                type: object
              optimization:
                description: |-
                  Optimization groups mixed-precision and LoRA settings.
                  Optional LLM overlay for pytorch backend.
                properties:
                  bf16FullEval:
                    description: BF16FullEval enables bf16 precision during evaluation
                      (CPU training).
                    type: boolean
                  lora:
                    description: LoRA configures Low-Rank Adaptation.
                    properties:
                      alpha:
                        default: 8
                        description: Alpha is the LoRA scaling factor. Defaults to
                          8.
                        format: int32
                        type: integer
                      dropout:
                        default: "0.1"
                        description: Dropout probability for LoRA layers. Defaults
                          to "0.1".
                        type: string
                      enabled:
                        description: Enabled toggles LoRA. When false all other fields
                          are ignored.
                        type: boolean
                      rank:
                        default: 4
                        description: Rank is the LoRA rank dimension. Defaults to
                          4.
                        format: int32
                        type: integer
                      targetModules:
                        description: TargetModules lists the model module names to
                          apply LoRA to.
                        items:
                          type: string
                        type: array
                    required:
                    - enabled
                    type: object
                  mixedPrecision:
                    default: bf16
                    description: MixedPrecision selects bf16 or fp32 training. Defaults
                      to bf16.
                    enum:
                    - bf16
                    - fp32
                    type: string
                type: object
              outputPVCName:
                description: |-
                  OutputPVCName is the name of the PVC for checkpoints and result files.
                  Must exist before the job is created.
                type: string
              pytorchSpec:
                description: |-
                  PytorchSpec configures the PyTorch job infrastructure.
                  Required when backend is "pytorch"; ignored otherwise.
                properties:
                  command:
                    description: |-
                      Command overrides the default torchrun entrypoint.
                      When set, it is used verbatim and model/dataset/training fields are ignored.
                      When omitted, the operator builds a torchrun command from model/dataset/training/optimization.
                    items:
                      type: string
                    type: array
                  env:
                    description: |-
                      Env is a list of environment variables to set in every replica container.
                      These are merged with the operator-generated HF token / cache variables.
                    items:
                      description: EnvVar represents an environment variable present
                        in a Container.
                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
