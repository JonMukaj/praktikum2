                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              finishTime:
                description: FinishTime records when the job reached Succeeded or
                  Failed.
                format: date-time
                type: string
              gkeOperationID:
                description: GKEOperationID is the name of the in-flight GKE long-running
                  operation.
                type: string
              jobName:
                description: JobName is the name of the generated backend job resource.
                type: string
              message:
                description: Message is a human-readable description of the current
                  state or last error.
                type: string
              nodePoolSize:
                description: NodePoolSize is the number of nodes currently provisioned.
                format: int32
                type: integer
              phase:
                description: Phase is the current lifecycle stage of the job.
                type: string
              provisioningStartTime:
                description: ProvisioningStartTime records when node-pool provisioning
