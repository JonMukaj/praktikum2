---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: distributedtraininghistories.training.distributedtraining.io
spec:
  group: training.distributedtraining.io
  names:
    kind: DistributedTrainingHistory
    listKind: DistributedTrainingHistoryList
    plural: distributedtraininghistories
    shortNames:
    - djh
    singular: distributedtraininghistory
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: DistributedTrainingHistory is the Schema for per-run throughput
          history used by the topology solver.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DistributedTrainingHistorySpec stores throughput metrics from a single completed run.
              Entries are written for every Succeeded run (objective and explicit-topology alike).
              Failed runs are excluded — partial throughput data would bias the solver.
            properties:
              actualCostUSD:
                description: |-
                  ActualCostUSD is the observed run cost in USD at the time of execution.
                  Stored for observability only — the solver recomputes cost from current pricing.
                type: string
              backend:
                description: Backend is the job backend that produced this entry (pytorch
                  or spark).
                enum:
                - pytorch
                - spark
                - job
                type: string
              configHash:
                description: |-
                  ConfigHash is the backend-aware hash of the job configuration fields
                  that affect throughput. Used to group entries for the same logical workload.
                type: string
              machineType:
                description: MachineType is the GCE machine type used for this run.
                type: string
              nodes:
                description: Nodes is the actual node count used in this run (n_k).
                format: int32
                type: integer
              provisioningSeconds:
                anyOf:
                - type: integer
                - type: string
                description: ProvisioningSeconds is the node pool provisioning time
                  T_provision in seconds.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              throughput:
                anyOf:
                - type: integer
                - type: string
                description: Throughput is the measured throughput P_k — tokens/sec
                  for PyTorch, records/sec for Spark.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              totalWork:
                anyOf:
                - type: integer
                - type: string
                description: TotalWork is the approximated total work W ≈ T_k × P_k.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              trainingSeconds:
                anyOf:
                - type: integer
                - type: string
                description: TrainingSeconds is the training duration T_k in seconds.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
            required:
            - backend
            - configHash
            - machineType
            - nodes
            - provisioningSeconds
            - throughput
            - totalWork
            - trainingSeconds
            type: object
        type: object
    served: true
    storage: true
