apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherits CRDs, RBAC, manager base, and metrics from config/default.
resources:
- ../../default

patches:
# Inject GKE-specific flags into the manager container args.
- path: manager_args_patch.yaml
  target:
    kind: Deployment
    name: controller-manager

# Annotate the ServiceAccount for Workload Identity — no key files needed.
- path: serviceaccount_wi_patch.yaml
  target:
    kind: ServiceAccount
    name: controller-manager
